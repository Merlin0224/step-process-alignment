[workspace]
name = "step-level-reasoning-alignment-dpo"
channels = ["conda-forge"]
platforms = ["linux-64"]
conda-pypi-map = { conda-forge = "empty-conda-pypi-map.json" }

[pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://download.pytorch.org/whl/cu124"]
index-strategy = "unsafe-first-match"

[environments]
dpo = { features = ["dpo"], no-default-feature = true, solve-group = "dpo" }

[feature.dpo.dependencies]
python = "3.11.*"
git = ">=2.45,<3"
cmake = ">=3.30,<4"
ninja = ">=1.12,<2"
pkg-config = ">=0.29,<1"

[feature.dpo.pypi-dependencies]
torch = "==2.6.0"
torchvision = "==0.21.0"
torchaudio = "==2.6.0"
llamafactory = "==0.9.4"
deepspeed = "==0.16.4"
bitsandbytes = ">=0.45.5,<0.46"
sentencepiece = ">=0.2,<0.3"
safetensors = ">=0.5,<0.6"
tensorboard = ">=2.18,<3"
wandb = ">=0.19,<0.20"
sympy = ">=1.13,<1.14"

[feature.dpo.tasks]
verify = "python ../../scripts/check_stack.py --env dpo"
